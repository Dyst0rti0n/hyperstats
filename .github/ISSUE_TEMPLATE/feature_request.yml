name: Feature request
description: Suggest a new sketch, optimisation, or API change.
labels: ["enhancement", "triage"]
body:
  - type: textarea
    attributes:
      label: What should hyperstats do?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Why?
      description: |
        Describe the use case. Be specific about what problem this
        solves and what the alternatives are.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Reference
      description: Links to papers / other implementations / prior art.

  - type: dropdown
    attributes:
      label: Which sketch (or new one)?
      options:
        - hll
        - cms
        - kll
        - tdigest
        - new sketch
        - cross-cutting (API, format, etc.)
