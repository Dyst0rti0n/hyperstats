name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }}, Go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.22", "1.23"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true

      - name: Verify modules
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (race)
        run: go test -race -timeout 5m ./...

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Run coverage
        run: |
          go test -timeout 5m -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out | tail -1

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61
          args: --timeout=5m

  fuzz:
    name: Fuzz (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      # Short fuzz runs as a smoke test on every PR. The aim is to catch
      # panics in unmarshal paths, not to find deep bugs (which would
      # need long fuzz runs scheduled separately).
      - name: Fuzz HLL
        run: go test ./hll/ -run=^$ -fuzz=FuzzUnmarshal -fuzztime=20s

      - name: Fuzz CMS
        run: go test ./cms/ -run=^$ -fuzz=FuzzUnmarshal -fuzztime=20s

      - name: Fuzz KLL
        run: go test ./kll/ -run=^$ -fuzz=FuzzUnmarshal -fuzztime=20s

      - name: Fuzz t-digest
        run: go test ./tdigest/ -run=^$ -fuzz=FuzzUnmarshal -fuzztime=20s
